<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">
<meta property="og:title" content="rainbow conditions">
<meta property="og:description" content="solar geometry, weather data and pot-of-gold locations for rainbow photos taken in sheffield">
<meta property="og:image" content="https://ltrg.co.uk/rainbows/og.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<body>
<header>
  <h1>rainbow conditions</h1>
  <p class="sub">sheffield rainbow photos &middot; click for data</p>
</header>
<div id="gallery"></div>
<div id="detail" class="detail hidden">
  <div class="detail-top">
    <div id="detail-head" class="head"></div>

      <button id="copy-link" class="icon-btn" aria-label="copy link" title="copy link to this photo">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 9.5l3-3m-1.5-2l1.8-1.8a2.1 2.1 0 013 3L11 7.5m-3 1l-1.8 1.8a2.1 2.1 0 01-3-3L5 5.5"/></svg>
      </button>
      <button id="close" aria-label="close">&times;</button>
    </div>
  </div>
  <div class="detail-inner">
    <div class="detail-photo"><img id="detail-img" src="" alt=""></div>
    <div class="detail-info">
      <div id="minimap"></div>
      <div id="meta"></div>
    </div>
  </div>
</div>
<script type="module" src="app.js"></script>
