<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rainbow conditions</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">
<meta property="og:title" content="rainbow conditions">
<meta property="og:description" content="solar geometry, weather data and pot-of-gold locations for 27 rainbow photos taken in sheffield">
<meta property="og:image" content="https://ltrg.co.uk/rainbows/og.png">
<meta property="og:url" content="https://ltrg.co.uk/rainbows/">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
</head>
<body>
<header>
  <h1>rainbow conditions</h1>
  <p class="sub">sheffield rainbow photos &middot; click for data</p>
  <div id="header-actions">
    <div id="apple-signin" class="signin-btn" title="sign in with apple to upload photos">
      <svg width="16" height="16" viewBox="0 0 256 315"><path d="M213.8 167.1c-.4-39.4 32.2-58.3 33.7-59.2-18.3-26.8-46.9-30.5-57.1-30.9-24.3-2.5-47.4 14.3-59.8 14.3-12.4 0-31.5-14-51.8-13.6-26.7.4-51.3 15.5-65 39.4-27.7 48.1-7.1 119.4 19.9 158.4 13.2 19.1 29 40.5 49.7 39.7 19.9-.8 27.5-12.9 51.6-12.9s30.9 12.9 52 12.5c21.5-.4 35.1-19.5 48.2-38.7 15.2-22.2 21.4-43.7 21.8-44.8-.5-.2-41.8-16.1-42.2-63.2zM174.3 50.2C185.4 36.9 193 18.6 191 0c-15.7.6-34.7 10.5-46 23.7-10.1 11.7-19 30.6-16.6 48.6 17.5 1.4 35.4-8.9 45.9-22.1z" fill="currentColor"/></svg>
    </div>
    <button id="upload-btn" class="upload-btn hidden" title="upload a rainbow photo">+</button>
    <input type="file" id="upload-input" accept="image/jpeg,image/heic,image/heif,image/png" class="hidden">
  </div>
</header>
<div id="gallery"></div>
<div id="detail" class="detail hidden">
  <div class="detail-top">
    <div id="detail-head" class="head"></div>
    <div class="detail-actions">
      <button id="copy-link" class="icon-btn" aria-label="copy link" title="copy link to this photo">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 9.5l3-3m-1.5-2l1.8-1.8a2.1 2.1 0 013 3L11 7.5m-3 1l-1.8 1.8a2.1 2.1 0 01-3-3L5 5.5"/></svg>
      </button>
      <button id="close" aria-label="close">&times;</button>
    </div>
  </div>
  <div class="detail-inner">
    <div class="detail-photo"><img id="detail-img" src="" alt=""></div>
    <div class="detail-info">
      <div id="minimap"></div>
      <div id="meta"></div>
    </div>
  </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
